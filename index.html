<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>connpass自動投稿システム — 運営者コンソール 完全版</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    :root{--border-color:#D8E0DA;--shadow-flat:0 1px 2px rgba(17,24,39,.05)}
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%}
    body{font-family:'Inter',system-ui,sans-serif;background:#FAFBFA;color:#111827;line-height:1.6}
    #app{width:100%;height:100vh;display:flex;overflow:hidden}

    .sidebar{width:248px;background:#F0F4F1;border-right:1px solid #DDE8DE;display:flex;flex-direction:column;flex-shrink:0;box-shadow:1px 0 0 #DDE8DE,4px 0 24px rgba(10,107,82,.05);overflow-y:auto;overflow-x:hidden}
    .sb-logo{padding:22px 20px 12px;border-bottom:1px solid #DDE8DE;margin-bottom:4px}
    .brand-name{font-size:14px;font-weight:700;color:#111827;display:flex;align-items:center;gap:7px}
    .brand-sub{font-size:10px;color:#94A3B8;margin-top:4px;letter-spacing:.06em;font-weight:500;text-transform:uppercase}
    .nav-wrap{padding:4px 10px 16px}
    .nav-section{font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:.06em;text-transform:uppercase;padding:14px 10px 4px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:#64748B;margin-bottom:1px;transition:all .12s;border:none;background:none;width:100%;text-align:left;font-weight:600;position:relative}
    .nav-item:hover{background:#F0F8F4;color:#0A6B52}
    .nav-item.active{background:#FFFFFF;color:#0A6B52;box-shadow:var(--shadow-flat)}
    .nav-item.done::after{content:'✓';position:absolute;right:10px;font-size:11px;color:#0A6B52;font-weight:700}
    .nav-icon{font-size:18px;width:22px;text-align:center;flex-shrink:0}
    .mode-switch{margin:8px 10px;display:flex;gap:3px;background:#DDE8DE;border-radius:6px;padding:3px;flex-shrink:0}
    .mode-btn{flex:1;padding:6px 8px;border-radius:4px;border:none;cursor:pointer;font-size:11px;font-weight:700;transition:all .12s;color:#64748B;background:transparent}
    .mode-btn.active{background:#0A6B52;color:#FFFFFF}

    .main{flex:1;overflow:auto;background:#FAFBFA;min-width:0;display:flex;flex-direction:column}
    .page{padding:28px 32px;flex:1;display:flex;flex-direction:column}
    .page-title{font-size:22px;font-weight:700;color:#111827;margin:0 0 8px;letter-spacing:-.02em;line-height:1.25}
    .page-sub{font-size:14px;color:#64748B;margin:0 0 24px}
    .eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;color:#9CA3AF;text-transform:uppercase;margin:0 0 6px}

    .card{background:#FFFFFF;border-radius:6px;padding:20px;box-shadow:var(--shadow-flat);border:1px solid var(--border-color)}
    .card-sm{background:#FFFFFF;border-radius:6px;padding:16px;box-shadow:var(--shadow-flat);border:1px solid var(--border-color)}

    .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
    .stat-card{background:#FFFFFF;border-radius:6px;padding:16px 18px;box-shadow:var(--shadow-flat);border:1px solid var(--border-color)}
    .stat-n{font-size:28px;font-weight:700;line-height:1;letter-spacing:-.02em;margin-top:4px}
    .stat-l{font-size:10px;color:#94A3B8;margin-top:6px;font-weight:600;text-transform:uppercase}
    .stat-card.green .stat-n{color:#0A6B52}
    .stat-card.amber .stat-n{color:#B45309}
    .stat-card.red   .stat-n{color:#C2410C}
    .stat-card.blue  .stat-n{color:#1D4ED8}
    .stat-card.purple .stat-n{color:#4C1D95}

    .badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;letter-spacing:.04em}
    .badge-green {background:#ECFDF5;color:#065F46;border:1px solid #6EE7B7}
    .badge-amber {background:#FFFBEB;color:#78350F;border:1px solid #FDE68A}
    .badge-red   {background:#FFF7ED;color:#9A3412;border:1px solid #FDBA74}
    .badge-blue  {background:#EFF6FF;color:#1E3A8A;border:1px solid #93C5FD}
    .badge-gray  {background:#F8FAFC;color:#475569;border:1px solid #CBD5E1}
    .badge-purple{background:#F5F3FF;color:#4C1D95;border:1px solid #C4B5FD}

    .table{width:100%;border-collapse:collapse;font-size:12px;line-height:1.5}
    .table th{text-align:left;font-size:10px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.06em;padding:9px 14px 9px 16px;border-bottom:2px solid #E2E8E2;background:#F8FAF8}
    .table td{padding:11px 14px 11px 16px;border-bottom:1px solid #EDF2ED;color:#374151;vertical-align:middle}
    .table tr:last-child td{border-bottom:none}
    .table tr:hover td{background:#F0FDF4}

    .form-label{font-size:11px;color:#374151;margin-bottom:8px;display:block;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
    .form-input{width:100%;background:#FFFFFF;border:1.5px solid #D8E4D8;border-radius:4px;padding:10px 12px;font-size:14px;color:#111827;outline:none;transition:all .15s}
    .form-input:focus{border-color:#0A6B52;box-shadow:0 0 0 3px rgba(10,107,82,.1)}
    .form-input::placeholder{color:#B8C9B8}
    .form-textarea{width:100%;background:#FFFFFF;border:1.5px solid #D8E4D8;border-radius:4px;padding:10px 12px;font-size:13px;color:#111827;outline:none;transition:all .15s;resize:vertical;font-family:inherit;line-height:1.8}
    .form-textarea:focus{border-color:#0A6B52;box-shadow:0 0 0 3px rgba(10,107,82,.1)}

    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:4px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
    .btn-primary{background:#0A6B52;color:#FFFFFF}
    .btn-primary:hover{background:#085A45}
    .btn-primary:disabled{opacity:.45;cursor:not-allowed}
    .btn-ghost{background:#FFFFFF;color:#374151;border:1.5px solid #D8E4D8}
    .btn-ghost:hover{background:#F6FAF6;color:#111827;border-color:#94A3B8}
    .btn-dark{background:#111827;color:#FFFFFF}
    .btn-dark:hover{background:#000000}
    .btn-danger{background:#FEE2E2;color:#991B1B;border:none}
    .btn-danger:hover{background:#FECACA}
    .btn-sm{padding:5px 11px;font-size:12px}

    .section-title{font-size:10px;font-weight:600;color:#94A3B8;margin-bottom:12px;text-transform:uppercase;letter-spacing:.06em}
    .alert-banner{background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:11px 14px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:14px;color:#78350F}
    .info-banner{background:#EFF6FF;border:1px solid #93C5FD;border-radius:8px;padding:11px 14px;display:flex;align-items:center;gap:10px;font-size:13px;color:#1E3A8A}

    .toggle-wrap{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0}
    .toggle-wrap input{opacity:0;width:0;height:0;position:absolute}
    .toggle-thumb{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#D1D5DB;border-radius:22px;transition:.25s}
    .toggle-thumb::before{position:absolute;content:'';height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
    .toggle-wrap input:checked + .toggle-thumb{background:#0A6B52}
    .toggle-wrap input:checked + .toggle-thumb::before{transform:translateX(18px)}

    .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
    .bar-label{font-size:12px;color:#374151;width:72px;flex-shrink:0;font-weight:600}
    .bar-track{flex:1;height:8px;background:#EDF2ED;border-radius:4px;overflow:hidden}
    .bar-fill{height:100%;border-radius:4px;background:#0A6B52}
    .bar-fill.blue{background:#1D4ED8}
    .bar-fill.purple{background:#7C3AED}
    .bar-fill.amber{background:#B45309}
    .bar-val{font-size:12px;color:#64748B;width:48px;text-align:right;flex-shrink:0}

    .avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;color:#fff}

    .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal-box{background:#FFFFFF;border-radius:12px;width:100%;max-width:520px;max-height:80vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    .modal-header{padding:20px 24px;border-bottom:1px solid #EDF2ED;display:flex;align-items:center;justify-content:space-between}
    .modal-body{padding:20px 24px}

    .plan-card{border-radius:8px;border:2px solid #E2E8E2;padding:20px;background:#FFFFFF;transition:border-color .15s;position:relative}
    .plan-card.featured{border-color:#0A6B52;background:#F0FDF4}
    .plan-card-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);white-space:nowrap}

    .search-box{display:flex;align-items:center;gap:8px;border:1.5px solid #D8E4D8;border-radius:4px;padding:9px 12px;background:#FFFFFF;flex:1 1 220px}
    .search-box input{border:none;outline:none;flex:1;font-size:14px;color:#111827;background:transparent;font-family:inherit}
    .search-box input::placeholder{color:#B8C9B8}

    .post-tab{padding:7px 16px;border-radius:20px;border:1.5px solid;cursor:pointer;font-size:12px;font-weight:700;transition:all .12s}
    .step-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .step-dot.done{background:#0A6B52;color:#FFFFFF}
    .step-dot.active{background:#FFFFFF;color:#0A6B52;border:2px solid #0A6B52}
    .step-dot.pending{background:#F1F5F1;color:#B8C9B8;border:1.5px solid #D8E4D8}
    .event-info-bar{background:#F0F8F4;border:1.5px solid #6EE7B7;border-radius:8px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .tl-item{display:flex;gap:14px}
    .tl-left{display:flex;flex-direction:column;align-items:center;width:32px;flex-shrink:0}
    .tl-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px}
    .tl-dot.green{background:#ECFDF5;color:#0A6B52;border:2px solid #6EE7B7}
    .tl-dot.amber{background:#FFFBEB;color:#B45309;border:2px solid #FDE68A}
    .tl-dot.red{background:#FFF7ED;color:#C2410C;border:2px solid #FDBA74}
    .tl-dot.gray{background:#F8FAFC;color:#94A3B8;border:2px solid #E2E8F0}
    .tl-line{flex:1;width:2px;background:#DDE8DE;margin:4px 0}
    .char-count{font-size:11px;color:#94A3B8;text-align:right;margin-top:4px}
    .char-count.over{color:#C2410C;font-weight:700}

    .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}
    .spinner-dark{border-color:#D8E4D8;border-top-color:#0A6B52}
    @keyframes spin{to{transform:rotate(360deg)}}
    .toast{position:fixed;top:16px;right:16px;z-index:9999;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.15);display:flex;align-items:center;gap:8px;animation:fadeIn .2s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

    @media(max-width:720px){.sidebar{width:200px}.stat-grid{grid-template-columns:repeat(2,1fr)}.page{padding:20px}}
  </style>
</head>
<body>
<div id="app"></div>
<script>
var h = React.createElement;
var useState = React.useState;
var Icon = function(name, s) { return h('i', { className:'ti ti-'+name, 'aria-hidden':'true', style:s }); };

// ── ナビゲーション定義 ─────────────────────────────────────────
var NAV = [
  { section:'初期機能（MVP）', items:[

    { id:'team',      label:'チーム・権限管理', icon:'users-group' },
  ]},
  { section:'将来機能（AI）', items:[

    { id:'mention',     label:'メンション自動化', icon:'at' },
    { id:'recommend',   label:'学習レコメンド',   icon:'bulb' },
  ]},
];

var ADMIN_NAV = [
  { section:'運営者コンソール', items:[
    { id:'admin_dashboard', label:'運営ダッシュボード', icon:'chart-pie' },
    { id:'admin_users',     label:'ユーザー管理',       icon:'users' },
    { id:'admin_posts',     label:'投稿モニタリング',   icon:'broadcast' },
  ]},
  { section:'運営設定', items:[
    { id:'admin_billing', label:'プラン・課金',   icon:'credit-card' },
    { id:'admin_notice',  label:'お知らせ配信',   icon:'bell' },
  ]},
];

// ── 運営者モックデータ ─────────────────────────────────────────
var MOCK_USERS = [
  { id:1, name:'株式会社テックスタイル', email:'pr@techstyle.jp',    plan:'Pro',  sns:['x','slack'],               events:18, posts:142, status:'active',    lastActive:'2026-06-28' },
  { id:2, name:'合同会社ヌマヅ開発',    email:'info@numazu.dev',     plan:'Team', sns:['x','facebook','linkedin'], events:34, posts:301, status:'active',    lastActive:'2026-06-29' },
  { id:3, name:'フリーランス 佐藤',     email:'sato@example.com',    plan:'Free', sns:['x'],                       events:3,  posts:11,  status:'trial',     lastActive:'2026-06-20' },
  { id:4, name:'NPO こどもIT',         email:'contact@kids-it.org', plan:'Pro',  sns:['x','facebook'],            events:9,  posts:58,  status:'active',    lastActive:'2026-06-27' },
  { id:5, name:'株式会社レガシー商会', email:'sns@legacy.co.jp',    plan:'Free', sns:[],                          events:1,  posts:0,   status:'suspended', lastActive:'2026-05-02' },
];

var MOCK_ALL_POSTS = [
  { id:101, user:'合同会社ヌマヅ開発',    event:'Go言語LT大会',            sns:'x',        trigger:'公開時', scheduledAt:'2026-06-29 10:00', status:'posted',    error:null },
  { id:102, user:'株式会社テックスタイル',event:'React入門もくもく会',      sns:'x',        trigger:'前日',   scheduledAt:'2026-06-29 18:00', status:'scheduled', error:null },
  { id:103, user:'NPO こどもIT',          event:'夏休みプログラミング教室', sns:'facebook', trigger:'3日前',  scheduledAt:'2026-06-29 09:00', status:'error',     error:'連携トークンの期限切れ' },
  { id:104, user:'合同会社ヌマヅ開発',    event:'Go言語LT大会',            sns:'slack',    trigger:'当日朝', scheduledAt:'2026-06-30 08:00', status:'scheduled', error:null },
];

var MOCK_SIGNUPS = [
  { month:'1月', count:4 }, { month:'2月', count:7 }, { month:'3月', count:6 },
  { month:'4月', count:11 }, { month:'5月', count:9 }, { month:'6月', count:14 },
];

var MOCK_NOTICES = [
  { id:1, title:'APIレート制限の仕様変更のお知らせ', target:'全ユーザー', sentAt:'2026-06-01 10:00', status:'sent',  reach:5 },
  { id:2, title:'メンテナンスのご案内（6/15 2:00〜4:00）', target:'全ユーザー', sentAt:'2026-06-10 09:00', status:'sent', reach:5 },
  { id:3, title:'Pro・Teamユーザー向け：新機能「AI告知文生成」リリース', target:'Pro / Team', sentAt:'2026-06-20 12:00', status:'sent', reach:3 },
];

var SNS_ICONS = { x:'brand-x', facebook:'brand-facebook', linkedin:'brand-linkedin', slack:'brand-slack' };

// ── 利用者向けモックデータ ────────────────────────────────────
var MOCK_EVENT = {
  title:    'TypeScript勉強会 Vol.12 — 型安全なAPIクライアントを作ろう',
  date:     '2026-07-20', time:'19:00 〜 21:00',
  location: '渋谷区道玄坂1-2-3 TECH HALL 4F',
  capacity: 50, attending: 32,
  url:      'https://connpass.com/event/xxxxxx/',
  tags:     ['TypeScript','JavaScript','フロントエンド'],
};
var SCHEDULES = [
  { id:'announce',   label:'公開告知', icon:'speakerphone',   timing:'【開催告知】',  schedAt:'2026-07-01 10:00' },
  { id:'three_days', label:'3日前',    icon:'calendar-minus', timing:'【開催3日前】', schedAt:'2026-07-17 09:00' },
  { id:'day_before', label:'前日',     icon:'calendar-event', timing:'【開催前日】',  schedAt:'2026-07-19 18:00' },
  { id:'day_of',     label:'当日朝',   icon:'sun',            timing:'【開催当日】',  schedAt:'2026-07-20 08:00' },
];
function makeTemplate(ev, timing) {
  return timing + ev.title + '\n\n' +
    '\u{1F4C5} ' + ev.date + ' ' + ev.time + '\n' +
    '\u{1F4CD} ' + ev.location + '\n' +
    '\u{1F465} 定員' + ev.capacity + '名（現在' + ev.attending + '名参加）\n\n' +
    '詳細・参加登録はこちら\u{1F447}\n' + ev.url + '\n\n' +
    ev.tags.map(function(t){ return '#'+t; }).join(' ') + ' #connpass';
}
function initPosts(ev) {
  return SCHEDULES.map(function(s, i) {
    return {
      id:s.id, label:s.label, icon:s.icon, schedAt:s.schedAt,
      text:makeTemplate(ev, s.timing),
      status: i===0?'posted':i===2?'error':'scheduled',
      postedAt: i===0?'2026-07-01 10:02':null,
      errorMsg: i===2?'API rate limit exceeded (429)':null,
    };
  });
}

// ── Login ─────────────────────────────────────────────────────
function LoginScreen(props) {
  var onLogin = props.onLogin;
  var ms = useState('login'); var mode = ms[0]; var setMode = ms[1];
  var es = useState('');      var email = es[0]; var setEmail = es[1];
  var ps = useState('');      var pw = ps[0];    var setPw = ps[1];
  return h('div', { style:{ width:'100%',height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#F2F5F2',padding:'20px' } },
    h('div', { style:{ width:'100%',maxWidth:'380px',background:'#FFFFFF',borderRadius:'12px',padding:'34px 30px',boxShadow:'0 10px 40px rgba(10,107,82,.10)',border:'1px solid #E2E8E2' } },
      h('div', { style:{ textAlign:'center',marginBottom:'24px' } },
        h('div', { style:{ fontSize:'15px',fontWeight:700,color:'#0A6B52',display:'inline-flex',alignItems:'center',gap:'8px' } },
          Icon('brand-x',{fontSize:'19px'}), 'connpass 自動投稿システム'),
        h('div', { style:{ fontSize:'11px',color:'#94A3B8',marginTop:'6px',letterSpacing:'.08em',textTransform:'uppercase' } }, 'SNS Auto-Post for connpass')),
      h('div', { style:{ display:'flex',gap:'4px',background:'#F1F5F1',padding:'4px',borderRadius:'8px',marginBottom:'22px' } },
        ['login','signup'].map(function(m) {
          return h('button', { key:m, onClick:function(){ setMode(m); },
            style:{ flex:1,padding:'8px',borderRadius:'6px',border:'none',cursor:'pointer',fontSize:'13px',fontWeight:700,
              background:mode===m?'#FFFFFF':'transparent',color:mode===m?'#0A6B52':'#94A3B8',
              boxShadow:mode===m?'0 1px 2px rgba(0,0,0,.06)':'none',transition:'all .12s' } },
            m==='login'?'ログイン':'新規登録');
        })),
      h('div', { style:{ marginBottom:'14px' } },
        h('label', { className:'form-label' }, 'メールアドレス'),
        h('input', { className:'form-input',type:'email',value:email,onChange:function(e){setEmail(e.target.value);},placeholder:'you@example.com' })),
      h('div', { style:{ marginBottom:'16px' } },
        h('label', { className:'form-label' }, 'パスワード'),
        h('input', { className:'form-input',type:'password',value:pw,onChange:function(e){setPw(e.target.value);},placeholder:'••••••••' })),

    else if(page==='admin_billing') content=h(AdminBilling,{});
    else if(page==='admin_notice')  content=h(AdminNotice,{});
    else content=h('div',{className:'page'},h('h1',{className:'page-title'},'404'));
  } else {
    if(page==='account_setup') content=h(AccountSetupPage,{onNavigate:navigate});
    else if(page==='dashboard')    content=h(DashboardPage,{eventData:eventData,setEventData:setEventData,posts:posts,setPosts:setPosts,onNavigate:navigate});
    else if(page==='editor')       content=h(EditorPage,{eventData:eventData,posts:posts,setPosts:setPosts,onNavigate:navigate});
    else if(page==='status')       content=h(StatusPage,{eventData:eventData,posts:posts,setPosts:setPosts,onNavigate:navigate});
    else                           content=h(ComingSoonPage,{id:page});
  }

  return h('div',{style:{display:'flex',height:'100vh',width:'100vw',overflow:'hidden'}},
    h(Sidebar,{current:page,onChange:setPage,navData:navData,mode:mode,onModeChange:switchMode,done:done}),
    h('main',{className:'main'},content));
}

ReactDOM.createRoot(document.getElementById('app')).render(h(App));
</script>
</body>
</html>
